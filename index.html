<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo & Video Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Photo & Video Editor</h1>

  <div class="editor">
    <input type="file" id="fileInput" accept="image/*,video/*">
    <div id="previewContainer">
      <img id="photoPreview" style="display:none;" />
      <video id="videoPreview" controls style="display:none;"></video>
    </div>

    <!-- Photo Controls -->
    <div id="photoControls" style="display:none;">
      <button onclick="rotatePhoto()">Rotate</button>
      <button onclick="applyFilter()">Filter</button>
      <input type="range" id="brightness" min="0" max="200" value="100" onchange="adjustBrightness()">
    </div>

    <!-- Video Controls -->
    <div id="videoControls" style="display:none;">
      <button onclick="trimVideo()">Trim</button>
      <button onclick="changeSpeed()">Speed</button>
    </div>

    <button onclick="downloadFile()">Download</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
